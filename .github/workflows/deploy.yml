name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler CLI
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare Workers
        env:
          # Wrangler reads these env vars automatically [[1]]
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Optional: Inject runtime variables
          EXA_API_KEY: ""
        run: |
          echo "Deploying Worker..."
          # Wrangler auto-detects CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID env vars
          # No need for --api-token or --account-id flags [[1]]
          wrangler deploy --name qwen-ai-api --var EXA_API_KEY:""
          echo "✅ Deployment complete!"
